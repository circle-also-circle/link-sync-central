<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link-Sync Central — Global Launch Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0f11; --bg2:#141519; --bg3:#1a1c22;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8e9ec; --text2:#8a8d97; --text3:#555860;
  --green:#1fcf8e; --green-dim:rgba(31,207,142,0.12);
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.12);
  --red:#f05252;   --red-dim:rgba(240,82,82,0.12);
  --blue:#4d9fff;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:12px; --rs:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
header{position:sticky;top:0;z-index:100;background:rgba(14,15,17,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;font-weight:500;font-size:14px;color:var(--text);text-decoration:none;white-space:nowrap}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.logo-icon::after{content:'';width:8px;height:8px;border-radius:50%;background:#0e0f11;position:absolute}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(31,207,142,0.4)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(31,207,142,0)}}
.live-badge{font-family:var(--mono);font-size:10px;color:var(--green);background:var(--green-dim);padding:2px 7px;border-radius:4px;letter-spacing:.5px;border:1px solid rgba(31,207,142,0.2);white-space:nowrap}
.project-name{font-size:12px;color:var(--text2);font-family:var(--mono);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hspacer{flex:1}
.sync-meta{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.print-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);font-size:11px;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .15s}
.print-btn:hover{color:var(--text);border-color:var(--text3)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 28px;background:var(--bg);overflow-x:auto}
.tab-btn{padding:10px 16px;font-size:12px;font-family:var(--font);color:var(--text3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--green)}
.tab-panel{display:none}
.tab-panel.active{display:block}
main{padding:20px 28px;max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c-green::before{background:var(--green)}.c-amber::before{background:var(--amber)}.c-red::before{background:var(--red)}.c-blue::before{background:var(--blue)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.stat-value{font-size:28px;font-weight:300;letter-spacing:-1px;line-height:1}
.stat-value.g{color:var(--green)}.stat-value.a{color:var(--amber)}.stat-value.r{color:var(--red)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono)}
.prog-bg{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width 1.4s cubic-bezier(.16,1,.3,1)}

/* card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.card-count{font-size:11px;color:var(--text3);font-family:var(--mono)}
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px}
.empty-msg{text-align:center;padding:28px 0;color:var(--text3);font-size:12px;font-family:var(--mono)}

/* signal grid */
.signal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.signal-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:border-color .15s}
.signal-card:hover{border-color:var(--border2)}
.signal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.signal-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:6px}
.signal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.signal-pct{font-size:20px;font-weight:300;letter-spacing:-.5px;margin-bottom:4px}
.signal-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* task */
.task-list{display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto;padding-right:2px}
.task-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--border);border-left-width:3px;cursor:pointer;transition:border-color .15s,filter .15s;animation:fadeIn .2s ease}
.task-item.st-done    {border-left-color:var(--green);background:rgba(31,207,142,0.03)}
.task-item.st-progress{border-left-color:var(--amber);background:rgba(245,166,35,0.03)}
.task-item.st-overdue {border-left-color:var(--red);background:rgba(240,82,82,0.05)}
.task-item.st-todo    {border-left-color:var(--text3);background:var(--bg3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.task-item:hover{border-color:var(--border2);filter:brightness(1.07)}
.task-item.st-done .task-title{color:var(--text3);text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.15)}
.task-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px}
.task-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* chip */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.chip::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chip-done    {background:rgba(31,207,142,0.14);color:var(--green);border:1px solid rgba(31,207,142,0.22)}
.chip-progress{background:rgba(245,166,35,0.14);color:var(--amber);border:1px solid rgba(245,166,35,0.22)}
.chip-overdue {background:rgba(240,82,82,0.14); color:var(--red);  border:1px solid rgba(240,82,82,0.22)}
.chip-todo    {background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border)}
.chip-done::before{background:var(--green)}.chip-progress::before{background:var(--amber)}
.chip-overdue::before{background:var(--red)}.chip-todo::before{background:var(--text3)}

/* subtask indent */
.task-item.is-subtask{margin-left:20px;border-left-color:var(--border2)!important;opacity:.9}
.task-item.is-subtask .task-title::before{content:'↳ ';color:var(--text3);font-size:11px}
.task-item.is-subtask .task-title{font-weight:400}

/* flag */
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-family:var(--mono);white-space:nowrap}
.flag-overdue {background:var(--red-dim); color:var(--red);  border:1px solid rgba(240,82,82,0.2)}
.flag-no-owner{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,0.2)}

/* issue card */
.issue-card{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:border-color .15s;margin-bottom:5px}
.issue-card:hover{border-color:var(--border2)}
.issue-card.overdue {border-left:3px solid var(--red)}
.issue-card.no-owner{border-left:3px solid var(--amber)}

/* owner */
.owner-list{display:flex;flex-direction:column;gap:9px}
.owner-row{display:grid;grid-template-columns:90px 1fr auto;align-items:center;gap:10px}
.owner-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.owner-bar-bg{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.owner-bar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.owner-cnt{font-size:11px;font-family:var(--mono);color:var(--text3);min-width:20px;text-align:right}

.filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.ftab{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.ftab:hover{color:var(--text2);border-color:var(--border2)}
.ftab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.report-section{margin-bottom:20px}
.report-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge-cnt{padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--mono)}
.badge-red  {background:var(--red-dim);color:var(--red)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.action-btn{padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.action-btn:hover{color:var(--text);border-color:var(--text3)}

#toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text);max-width:320px;pointer-events:none;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s}
#toast.show{opacity:1;transform:translateY(0)}

@media print {
  body{background:#fff!important;color:#111!important;font-size:11px}
  header,.tabs,.no-print{display:none!important}
  .tab-panel{display:block!important}
  main{padding:8px;gap:10px;max-width:100%}
  .card,.stat-card,.signal-card,.gauge-card,.risk-banner,.issue-card,.task-item{background:#fff!important;border-color:#ddd!important;color:#111!important;break-inside:avoid}
  .stat-value,.gauge-pct,.risk-score,.signal-pct{color:#111!important}
  .stat-label,.card-title,.stat-sub,.signal-sub,.owner-name,.task-meta,.risk-label{color:#555!important}
  .task-item.st-done .task-title{color:#aaa!important}
  .chip-done{background:#e6faf3!important;color:#0a7a52!important;border-color:#b3e8d3!important}
  .chip-progress{background:#fff8ea!important;color:#7a4e00!important;border-color:#f0d9a0!important}
  .chip-overdue{background:#fef0f0!important;color:#a01010!important;border-color:#f0b3b3!important}
  .prog-fill,.signal-dot,.gauge-fill{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .task-list{max-height:none!important;overflow:visible!important}
  .two-col,.exec-top{grid-template-columns:1fr 1fr!important}
  .stat-grid{grid-template-columns:repeat(4,1fr)!important}
  #tab-tasks{display:none!important}
  @page{size:A4;margin:14mm}
}

@media(max-width:960px){
  .stat-grid,.exec-top{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  main{padding:14px}
  header{padding:0 14px;gap:10px}
  .tabs{padding:0 14px}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#"><div class="logo-icon"></div>Link&#8209;Sync&nbsp;Central</a>
  <div class="pulse-dot"></div>
  <span class="live-badge">LIVE</span>
  <span class="project-name" id="projectName">로딩 중…</span>
  <div class="hspacer"></div>
  <div class="sync-meta" id="syncMeta">—</div>
  <button class="print-btn no-print" onclick="printReport()">🖨 PDF 저장</button>
</header>

<nav class="tabs no-print">
  <button class="tab-btn active" onclick="switchTab('dashboard',this)">대시보드</button>
  <button class="tab-btn" onclick="switchTab('report',this)">이슈 리포트 <span id="issueCount" style="font-family:var(--mono);font-size:10px;background:var(--red-dim);color:var(--red);padding:1px 5px;border-radius:3px;margin-left:4px;display:none"></span></button>
  <button class="tab-btn" onclick="switchTab('tasks',this)">전체 태스크</button>
</nav>

<!-- ══ 대시보드 ══════════════════════════════════════════════════════ -->
<div id="tab-dashboard" class="tab-panel active">
<main>
  <div class="stat-grid">
    <div class="stat-card c-blue">
      <div class="stat-label">전체 태스크</div>
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-sub" id="projectLabel">Asana 프로젝트</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-label">완료율</div>
      <div class="stat-value g" id="doneRate">—</div>
      <div class="prog-bg"><div class="prog-fill" id="overallBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card c-red">
      <div class="stat-label">기한 초과</div>
      <div class="stat-value r" id="overdueCount">—</div>
      <div class="stat-sub">overdue</div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-label">담당자 없음</div>
      <div class="stat-value a" id="noOwnerCount">—</div>
      <div class="stat-sub">미배정</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-hd">
        <div class="card-title">섹션별 진행률</div>
        <span class="card-count" id="sectionCount">—</span>
      </div>
      <div class="signal-grid" id="sectionGrid"><div class="empty-msg">로딩 중…</div></div>
    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-title">담당자별 진행 태스크</div>
        <span class="card-count" id="ownerCount">—</span>
      </div>
      <div class="owner-list" id="ownerList"><div class="empty-msg">—</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">
      <div class="card-title">진행중 태스크 피드</div>
      <span class="card-count" id="feedCount">—</span>
    </div>
    <div class="task-list" id="taskFeed"></div>
  </div>
</main>
</div>

<!-- ══ 이슈 리포트 ══════════════════════════════════════════════════ -->
<div id="tab-report" class="tab-panel">
<main>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:16px;font-weight:500;margin-bottom:4px" id="reportTitle">이슈 리포트</div>
      <div style="font-size:12px;color:var(--text3);font-family:var(--mono)" id="reportSubtitle">—</div>
    </div>
    <div style="display:flex;gap:8px" class="no-print">
      <button class="action-btn" onclick="copyReportText()">📋 슬랙 / 이메일 복사</button>
      <button class="action-btn" onclick="printReport()">🖨 PDF 저장</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--green);border-radius:var(--r);padding:14px 16px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">전체 완료율</div>
      <div style="font-size:26px;font-weight:300;color:var(--green)" id="rDoneRate">—</div>
      <div class="prog-bg" style="margin-top:8px"><div class="prog-fill" id="rDoneBar" style="width:0%"></div></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--red);border-radius:var(--r);padding:14px 16px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">기한 초과</div>
      <div style="font-size:26px;font-weight:300;color:var(--red)" id="rOverdue">—</div>
      <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px">즉시 조치 필요</div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--amber);border-radius:var(--r);padding:14px 16px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">담당자 미배정</div>
      <div style="font-size:26px;font-weight:300;color:var(--amber)" id="rNoOwner">—</div>
      <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px">배정 필요</div>
    </div>
  </div>

  <div class="card">
    <div class="report-section">
      <div class="report-title">🔴 기한 초과 태스크 <span class="badge-cnt badge-red" id="overdueListCount">0건</span></div>
      <div id="overdueList"><div class="empty-msg">기한 초과 항목 없음 ✓</div></div>
    </div>
    <div style="height:1px;background:var(--border);margin:20px 0"></div>
    <div class="report-section">
      <div class="report-title">🟡 담당자 미배정 태스크 <span class="badge-cnt badge-amber" id="noOwnerListCount">0건</span></div>
      <div id="noOwnerList"><div class="empty-msg">미배정 항목 없음 ✓</div></div>
    </div>
  </div>
</main>
</div>

<!-- ══ 전체 태스크 ══════════════════════════════════════════════════ -->
<div id="tab-tasks" class="tab-panel">
<main>
  <div class="card">
    <div class="card-hd">
      <div class="card-title">전체 태스크</div>
      <span class="card-count" id="allTaskCount">—</span>
    </div>
    <div class="filter-row" id="sectionFilter"></div>
    <div class="task-list" style="max-height:640px" id="allTaskList"></div>
  </div>
</main>
</div>

<div id="toast"></div>

<script>
let DATA = null;
let currentSection = 'all';
const chipCls = {done:'chip-done',progress:'chip-progress',overdue:'chip-overdue',todo:'chip-todo'};
const chipLbl = {done:'완료',progress:'진행중',overdue:'기한 초과',todo:'대기'};
const itemCls = {done:'st-done',progress:'st-progress',overdue:'st-overdue',todo:'st-todo'};

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

async function loadData() {
  try {
    DATA = await (await fetch('data.json?t='+Date.now())).json();
    render(DATA);
  } catch(e) {
    document.getElementById('syncMeta').textContent = '데이터 로드 실패';
  }
}

function calcRisk(d) {
  let score = d.done_rate;
  score = Math.max(0, score - Math.min(d.overdue_count*8,30) - Math.min(d.no_assignee.length*4,20));
  if (score >= 70) return {level:'green',icon:'🟢',label:'정상',desc:`완료율 ${d.done_rate}% — 런칭 준비가 순조롭게 진행되고 있습니다.`,score};
  if (score >= 40) return {level:'amber',icon:'🟡',label:'주의',desc:`기한 초과 ${d.overdue_count}건 / 미배정 ${d.no_assignee.length}건 — 일부 항목의 조치가 필요합니다.`,score};
  return {level:'red',icon:'🔴',label:'위험',desc:`심각한 지연 또는 미배정 항목이 다수입니다. 즉각적인 조치가 필요합니다.`,score};
}

function render(d) {
  document.getElementById('projectName').textContent  = d.project_name || '프로젝트명 없음';
  document.getElementById('syncMeta').textContent     = '동기화: ' + d.synced_at;
  document.getElementById('projectLabel').textContent = d.project_name || 'Asana 프로젝트';
  const issueTotal = d.overdue_count + d.no_assignee.length;
  const badge = document.getElementById('issueCount');
  badge.style.display = issueTotal > 0 ? 'inline' : 'none';
  badge.textContent = issueTotal;
  renderDashboard(d); renderReport(d); renderAllTasks(d);
}

function buildSignalGrid(id, d) {
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  if (!d.sections.length) { grid.innerHTML = '<div class="empty-msg">섹션 없음</div>'; return; }
  d.sections.forEach(sec => {
    const tasks = d.tasks.filter(t=>t.section===sec);
    const total = tasks.length;
    const done  = tasks.filter(t=>t.completed).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const color = pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    const card  = document.createElement('div');
    card.className = 'signal-card';
    card.innerHTML = `
      <div class="signal-top">
        <div class="signal-name" title="${sec}">${sec}</div>
        <div class="signal-dot" style="background:${color}"></div>
      </div>
      <div class="signal-pct" style="color:${color}">${pct}%</div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="signal-sub" style="margin-top:5px">${done}/${total} 완료</div>`;
    grid.appendChild(card);
  });
}

function renderDashboard(d) {
  document.getElementById('totalCount').textContent   = d.total;
  document.getElementById('doneRate').textContent      = d.done_rate+'%';
  document.getElementById('overallBar').style.width   = d.done_rate+'%';
  document.getElementById('overdueCount').textContent = d.overdue_count;
  document.getElementById('noOwnerCount').textContent = d.no_assignee.length;
  document.getElementById('sectionCount').textContent = d.sections.length+'개 섹션';

  buildSignalGrid('sectionGrid', d);

  const ownerList = document.getElementById('ownerList');
  const entries = Object.entries(d.owner_counts).sort((a,b)=>b[1]-a[1]);
  ownerList.innerHTML = '';
  if (!entries.length) { ownerList.innerHTML = '<div class="empty-msg">담당자 없음</div>'; }
  else {
    const max = entries[0][1];
    document.getElementById('ownerCount').textContent = entries.length+'명';
    entries.forEach(([name,cnt]) => {
      const row = document.createElement('div');
      row.className = 'owner-row';
      const color = cnt>=7?'var(--red)':cnt>=4?'var(--amber)':'var(--green)';
      row.innerHTML = `
        <div class="owner-name" title="${name}">${name}</div>
        <div class="owner-bar-bg"><div class="owner-bar-fill" style="width:${Math.round(cnt/max*100)}%;background:${color}"></div></div>
        <div class="owner-cnt">${cnt}</div>`;
      ownerList.appendChild(row);
    });
  }

  const feed = document.getElementById('taskFeed');
  const active = d.tasks.filter(t=>!t.completed).sort((a,b)=>{
    if(a.status==='overdue'&&b.status!=='overdue') return -1;
    if(b.status==='overdue'&&a.status!=='overdue') return 1;
    if(a.due_on&&b.due_on) return a.due_on.localeCompare(b.due_on);
    return a.due_on?-1:1;
  }).slice(0,20);
  document.getElementById('feedCount').textContent = active.length+'건 진행중';
  feed.innerHTML = '';
  if (!active.length) { feed.innerHTML = '<div class="empty-msg">진행중 태스크 없음</div>'; }
  else active.forEach(t=>feed.appendChild(makeTaskItem(t)));
}

function renderReport(d) {
  document.getElementById('reportTitle').textContent    = (d.project_name||'프로젝트')+' — 이슈 리포트';
  document.getElementById('reportSubtitle').textContent = '기준: '+d.synced_at;
  document.getElementById('rDoneRate').textContent = d.done_rate+'%';
  document.getElementById('rDoneBar').style.width  = d.done_rate+'%';
  document.getElementById('rOverdue').textContent  = d.overdue_count;
  document.getElementById('rNoOwner').textContent  = d.no_assignee.length;
  const odEl = document.getElementById('overdueList');
  document.getElementById('overdueListCount').textContent = d.overdue.length+'건';
  if (!d.overdue.length) { odEl.innerHTML = '<div class="empty-msg">기한 초과 항목 없음 ✓</div>'; }
  else { odEl.innerHTML=''; d.overdue.forEach(t=>odEl.appendChild(makeIssueCard(t,'overdue'))); }
  const naEl = document.getElementById('noOwnerList');
  document.getElementById('noOwnerListCount').textContent = d.no_assignee.length+'건';
  if (!d.no_assignee.length) { naEl.innerHTML = '<div class="empty-msg">미배정 항목 없음 ✓</div>'; }
  else { naEl.innerHTML=''; d.no_assignee.forEach(t=>naEl.appendChild(makeIssueCard(t,'no-owner'))); }
}

function renderAllTasks(d) {
  const filterEl = document.getElementById('sectionFilter');
  filterEl.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className='ftab active'; allBtn.textContent='전체';
  allBtn.onclick=()=>{currentSection='all';filterAllTasks(d);setActiveFilter(allBtn);};
  filterEl.appendChild(allBtn);
  d.sections.forEach(sec=>{
    const btn=document.createElement('button');
    btn.className='ftab'; btn.textContent=sec;
    btn.onclick=()=>{currentSection=sec;filterAllTasks(d);setActiveFilter(btn);};
    filterEl.appendChild(btn);
  });
  filterAllTasks(d);
}
function setActiveFilter(btn){
  document.querySelectorAll('#sectionFilter .ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function filterAllTasks(d){
  const el=document.getElementById('allTaskList');
  const items=currentSection==='all'?d.tasks:d.tasks.filter(t=>t.section===currentSection);
  document.getElementById('allTaskCount').textContent=items.length+'개';
  el.innerHTML='';
  if(!items.length){el.innerHTML='<div class="empty-msg">태스크 없음</div>';return;}
  items.forEach(t=>el.appendChild(makeTaskItem(t)));
}

function makeTaskItem(t) {
  const item = document.createElement('div');
  const subtaskCls = t.is_subtask ? ' is-subtask' : '';
  item.className = 'task-item '+(itemCls[t.status]||'st-todo')+subtaskCls;
  // 하위 태스크는 CSS로 ↳ 표시하므로 title에서 중복 제거
  const displayTitle = t.is_subtask ? t.title.replace(/^↳\s*/, '') : t.title;
  const dueStr      = t.due_on?formatDate(t.due_on):'—';
  const dueStyle    = t.status==='overdue'?'color:var(--red);font-weight:500':'';
  const overdueDays = t.status==='overdue'?` <span class="flag flag-overdue">+${daysSince(t.due_on)}일</span>`:'';
  const noOwner     = !t.assignee&&!t.completed?`<span class="flag flag-no-owner">담당자없음</span>`:'';
  item.innerHTML = `
    <div style="overflow:hidden;min-width:0">
      <div class="task-title">${escHtml(displayTitle)}</div>
      <div class="task-meta">
        <span>${t.assignee?escHtml(t.assignee):'<span style="color:var(--amber)">미배정</span>'}</span>
        <span>·</span>
        <span style="${dueStyle}">${dueStr}${overdueDays}</span>
        ${t.section?`<span>·</span><span>${escHtml(t.section)}</span>`:''}
        ${noOwner}
      </div>
    </div>
    <div class="task-right">
      <span class="chip ${chipCls[t.status]||'chip-todo'}">${chipLbl[t.status]||'—'}</span>
    </div>`;
  if(t.url) item.onclick=()=>window.open(t.url,'_blank');
  return item;
}

function makeIssueCard(t, type) {
  const card = document.createElement('div');
  card.className = 'issue-card '+type;
  const dueStr = t.due_on?formatDate(t.due_on):'마감일 없음';
  card.innerHTML = `
    <div>
      <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px">${escHtml(t.title)}</div>
      <div style="font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${t.assignee?`<span>${escHtml(t.assignee)}</span>`:`<span class="flag flag-no-owner">담당자 없음</span>`}
        <span style="${type==='overdue'?'color:var(--red)':''}">${dueStr}</span>
        ${t.section?`<span>·</span><span>${escHtml(t.section)}</span>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      ${type==='overdue'?`<span class="flag flag-overdue">+${daysSince(t.due_on)}일 초과</span>`:`<span class="flag flag-no-owner">미배정</span>`}
      ${t.url?`<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">Asana ↗</span>`:''}
    </div>`;
  if(t.url) card.onclick=()=>window.open(t.url,'_blank');
  return card;
}

function copyReportText() {
  if(!DATA) return;
  const d=DATA, risk=calcRisk(d);
  const lines=[
    `📊 *${d.project_name} — 런칭 현황 리포트*`,
    `기준: ${d.synced_at}`,``,
    `${risk.icon} 런칭 준비도: *${risk.label}* (${risk.score}점)`,
    `✅ 완료율: *${d.done_rate}%* (${d.done}/${d.total})`,
    `🔴 기한 초과: *${d.overdue_count}건*`,
    `🟡 담당자 미배정: *${d.no_assignee.length}건*`,
  ];
  if(d.overdue.length){
    lines.push('','🔴 *기한 초과 항목*');
    d.overdue.forEach(t=>lines.push(`  • ${t.title}  (${t.assignee||'미배정'} / 마감 ${t.due_on||'없음'} / +${daysSince(t.due_on)}일 초과)`));
  }
  if(d.no_assignee.length){
    lines.push('','🟡 *담당자 미배정 항목*');
    d.no_assignee.forEach(t=>lines.push(`  • ${t.title}  (마감 ${t.due_on||'없음'} / ${t.section||'섹션없음'})`));
  }
  lines.push('',`🔗 대시보드: ${location.href}`);
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>showToast('📋 클립보드에 복사됐어요!'))
    .catch(()=>showToast('복사 실패'));
}

function printReport() {
  document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='block');
  window.print();
  setTimeout(()=>{
    document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='');
    const active = document.querySelector('.tab-panel.active');
    if(active) active.style.display='block';
  },600);
}

function formatDate(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${m}/${d}`;}
function daysSince(iso){if(!iso)return 0;return Math.max(0,Math.floor((Date.now()-new Date(iso).getTime())/86400000));}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

loadData();
setInterval(loadData, 600000);
</script>
