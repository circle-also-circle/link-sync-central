<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link-Sync Central — Global Launch Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0f11; --bg2:#141519; --bg3:#1a1c22;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8e9ec; --text2:#8a8d97; --text3:#555860;
  --green:#1fcf8e; --green-dim:rgba(31,207,142,0.12);
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.12);
  --red:#f05252;   --red-dim:rgba(240,82,82,0.12);
  --blue:#4d9fff;  --blue-dim:rgba(77,159,255,0.12);
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:10px; --rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── header ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(14,15,17,0.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:56px;
  display:flex;align-items:center;gap:16px;
}
.logo{display:flex;align-items:center;gap:8px;font-weight:500;font-size:14px;color:var(--text);text-decoration:none;white-space:nowrap}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.logo-icon::after{content:'';width:8px;height:8px;border-radius:50%;background:#0e0f11;position:absolute}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(31,207,142,0.4)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(31,207,142,0)}}
.live-badge{font-family:var(--mono);font-size:10px;color:var(--green);background:var(--green-dim);padding:2px 7px;border-radius:4px;letter-spacing:.5px;border:1px solid rgba(31,207,142,0.2)}
.project-name{font-size:12px;color:var(--text2);font-family:var(--mono);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hspacer{flex:1}
.sync-meta{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}

/* ── tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 28px;background:var(--bg)}
.tab-btn{padding:10px 16px;font-size:12px;font-family:var(--font);color:var(--text3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--green)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── main ── */
main{padding:20px 28px;max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

/* ── stat row ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.c-green::before{background:var(--green)}.c-amber::before{background:var(--amber)}.c-red::before{background:var(--red)}.c-blue::before{background:var(--blue)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;letter-spacing:.3px}
.stat-value{font-size:28px;font-weight:300;letter-spacing:-1px;line-height:1}
.stat-value.g{color:var(--green)}.stat-value.a{color:var(--amber)}.stat-value.r{color:var(--red)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono)}
.prog-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width 1.2s cubic-bezier(.16,1,.3,1)}

/* ── card ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.card-count{font-size:11px;color:var(--text3);font-family:var(--mono)}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:14px}
.empty-msg{text-align:center;padding:28px 0;color:var(--text3);font-size:12px;font-family:var(--mono)}

/* ── task list ── */
.task-list{display:flex;flex-direction:column;gap:5px;max-height:360px;overflow-y:auto;padding-right:2px}
.task-item{
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;
  padding:9px 12px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--bg3);cursor:pointer;transition:border-color .15s;
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.task-item:hover{border-color:var(--border2)}
.task-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.task-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.task-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;align-items:flex-start}

/* ── issue flag ── */
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-family:var(--mono);white-space:nowrap}
.flag-overdue{background:var(--red-dim);color:var(--red);border:1px solid rgba(240,82,82,0.2)}
.flag-no-owner{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,0.2)}
.flag-new{background:var(--green-dim);color:var(--green);border:1px solid rgba(31,207,142,0.2)}

/* ── status dot ── */
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.s-done{background:var(--green)}.s-progress{background:var(--amber)}.s-overdue{background:var(--red)}.s-todo{background:var(--text3)}

/* ── section filter ── */
.filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.ftab{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.ftab:hover{color:var(--text2);border-color:var(--border2)}
.ftab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* ── owner heatmap ── */
.owner-list{display:flex;flex-direction:column;gap:8px}
.owner-row{display:grid;grid-template-columns:100px 1fr auto;align-items:center;gap:10px}
.owner-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.owner-bar-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.owner-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width 1s ease}
.owner-cnt{font-size:11px;font-family:var(--mono);color:var(--text3);min-width:24px;text-align:right}

/* ── report panel ── */
.report-section{margin-bottom:20px}
.report-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge-cnt{padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--mono)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}

/* ── issue card ── */
.issue-card{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;
  padding:12px 14px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--bg3);cursor:pointer;transition:border-color .15s;margin-bottom:6px;
}
.issue-card:hover{border-color:var(--border2)}
.issue-card.overdue{border-left:2px solid var(--red)}
.issue-card.no-owner{border-left:2px solid var(--amber)}

/* ── section progress ── */
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.sec-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.sec-name{font-size:11px;color:var(--text2);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-pct{font-size:20px;font-weight:300;color:var(--text);margin-bottom:6px;letter-spacing:-.5px}
.sec-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── toast ── */
#toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text);max-width:300px;pointer-events:none;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s}
#toast.show{opacity:1;transform:translateY(0)}

/* ── responsive ── */
@media(max-width:900px){
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  main{padding:16px}
  header{padding:0 16px;gap:10px}
  .tabs{padding:0 16px}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon"></div>
    Link&#8209;Sync&nbsp;Central
  </a>
  <div class="pulse-dot"></div>
  <span class="live-badge">LIVE</span>
  <span class="project-name" id="projectName">로딩 중…</span>
  <div class="hspacer"></div>
  <div class="sync-meta" id="syncMeta">—</div>
</header>

<!-- 탭 네비게이션 -->
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard',this)">대시보드</button>
  <button class="tab-btn" onclick="switchTab('report',this)">이슈 리포트 <span id="issueCount" style="font-family:var(--mono);font-size:10px;background:var(--red-dim);color:var(--red);padding:1px 5px;border-radius:3px;margin-left:4px;display:none"></span></button>
  <button class="tab-btn" onclick="switchTab('tasks',this)">전체 태스크</button>
</nav>

<!-- ══ 대시보드 탭 ══════════════════════════════════════════════════ -->
<div id="tab-dashboard" class="tab-panel active">
<main>

  <!-- stat row -->
  <div class="stat-row">
    <div class="stat-card c-green">
      <div class="stat-label">전체 태스크</div>
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-sub" id="projectLabel">Asana 프로젝트</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-label">완료율</div>
      <div class="stat-value g" id="doneRate">—</div>
      <div class="prog-bg"><div class="prog-fill" id="overallBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card c-red">
      <div class="stat-label">기한 초과</div>
      <div class="stat-value r" id="overdueCount">—</div>
      <div class="stat-sub">overdue</div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-label">담당자 없음</div>
      <div class="stat-value a" id="noOwnerCount">—</div>
      <div class="stat-sub">미배정 태스크</div>
    </div>
  </div>

  <!-- 섹션별 진행률 + 담당자 현황 -->
  <div class="two-col">
    <div class="card">
      <div class="card-hd">
        <div class="card-title">섹션별 진행률</div>
        <span class="card-count" id="sectionCount">—</span>
      </div>
      <div class="section-grid" id="sectionGrid">
        <div class="empty-msg">데이터 로딩 중…</div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <div class="card-title">담당자별 진행 태스크</div>
        <span class="card-count" id="ownerCount">—</span>
      </div>
      <div class="owner-list" id="ownerList">
        <div class="empty-msg">—</div>
      </div>
    </div>
  </div>

  <!-- 최근 태스크 피드 (미완료 최신순) -->
  <div class="card">
    <div class="card-hd">
      <div class="card-title">진행중 태스크 피드</div>
      <span class="card-count" id="feedCount">—</span>
    </div>
    <div class="task-list" id="taskFeed"></div>
  </div>

</main>
</div>

<!-- ══ 이슈 리포트 탭 ══════════════════════════════════════════════ -->
<div id="tab-report" class="tab-panel">
<main>
  <div class="card">
    <div class="report-section">
      <div class="report-title">
        기한 초과 태스크
        <span class="badge-cnt badge-red" id="overdueListCount">0건</span>
      </div>
      <div id="overdueList"><div class="empty-msg">기한 초과 항목 없음</div></div>
    </div>

    <div style="height:1px;background:var(--border);margin-bottom:20px"></div>

    <div class="report-section">
      <div class="report-title">
        담당자 미배정 태스크
        <span class="badge-cnt badge-amber" id="noOwnerListCount">0건</span>
      </div>
      <div id="noOwnerList"><div class="empty-msg">미배정 항목 없음</div></div>
    </div>
  </div>
</main>
</div>

<!-- ══ 전체 태스크 탭 ══════════════════════════════════════════════ -->
<div id="tab-tasks" class="tab-panel">
<main>
  <div class="card">
    <div class="card-hd">
      <div class="card-title">전체 태스크</div>
      <span class="card-count" id="allTaskCount">—</span>
    </div>
    <div class="filter-row" id="sectionFilter"></div>
    <div class="task-list" style="max-height:600px" id="allTaskList"></div>
  </div>
</main>
</div>

<div id="toast"></div>

<script>
// ── 상태 ──────────────────────────────────────────────────────────────
let DATA = null;
let currentSection = 'all';

const statusDot   = { done:'s-done', progress:'s-progress', overdue:'s-overdue', todo:'s-todo' };
const statusLabel = { done:'완료', progress:'진행중', overdue:'기한초과', todo:'대기' };

// ── 탭 전환 ───────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── 데이터 로드 ───────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('data.json?t=' + Date.now());
    DATA       = await res.json();
    render(DATA);
  } catch(e) {
    document.getElementById('syncMeta').textContent = '데이터 로드 실패 — data.json 확인 필요';
  }
}

// ── 메인 렌더 ─────────────────────────────────────────────────────────
function render(d) {
  // header
  document.getElementById('projectName').textContent = d.project_name || '프로젝트명 없음';
  document.getElementById('syncMeta').textContent    = '동기화: ' + d.synced_at;
  document.getElementById('projectLabel').textContent = d.project_name || 'Asana 프로젝트';

  // stat cards
  document.getElementById('totalCount').textContent  = d.total;
  document.getElementById('doneRate').textContent     = d.done_rate + '%';
  document.getElementById('overallBar').style.width  = d.done_rate + '%';
  document.getElementById('overdueCount').textContent = d.overdue_count;
  document.getElementById('noOwnerCount').textContent = d.no_assignee.length;

  // issue tab badge
  const issueTotal = d.overdue_count + d.no_assignee.length;
  const badge = document.getElementById('issueCount');
  if (issueTotal > 0) { badge.textContent = issueTotal; badge.style.display = 'inline'; }
  else badge.style.display = 'none';

  renderSections(d);
  renderOwners(d);
  renderFeed(d);
  renderReport(d);
  renderAllTasks(d);
}

// ── 섹션별 진행률 ──────────────────────────────────────────────────────
function renderSections(d) {
  const grid = document.getElementById('sectionGrid');
  if (!d.sections.length) { grid.innerHTML = '<div class="empty-msg">섹션 없음</div>'; return; }
  grid.innerHTML = '';

  d.sections.forEach(sec => {
    const tasks     = d.tasks.filter(t => t.section === sec);
    const total     = tasks.length;
    const done      = tasks.filter(t => t.completed).length;
    const pct       = total ? Math.round(done / total * 100) : 0;
    const color     = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
    const card      = document.createElement('div');
    card.className  = 'sec-card';
    card.innerHTML  = `
      <div class="sec-name" title="${sec}">${sec}</div>
      <div class="sec-pct" style="color:${color}">${pct}%</div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="sec-sub" style="margin-top:6px">${done}/${total} 완료</div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('sectionCount').textContent = d.sections.length + '개 섹션';
}

// ── 담당자별 현황 ──────────────────────────────────────────────────────
function renderOwners(d) {
  const list = document.getElementById('ownerList');
  const counts = d.owner_counts;
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  if (!entries.length) { list.innerHTML = '<div class="empty-msg">담당자 데이터 없음</div>'; return; }

  const max = entries[0][1];
  list.innerHTML = '';
  document.getElementById('ownerCount').textContent = entries.length + '명';

  entries.forEach(([name, cnt]) => {
    const row = document.createElement('div');
    row.className = 'owner-row';
    const pct = Math.round(cnt / max * 100);
    const color = cnt >= 7 ? 'var(--red)' : cnt >= 4 ? 'var(--amber)' : 'var(--green)';
    row.innerHTML = `
      <div class="owner-name" title="${name}">${name}</div>
      <div class="owner-bar-bg"><div class="owner-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="owner-cnt">${cnt}</div>
    `;
    list.appendChild(row);
  });
}

// ── 진행중 피드 ────────────────────────────────────────────────────────
function renderFeed(d) {
  const el = document.getElementById('taskFeed');
  const active = d.tasks
    .filter(t => !t.completed)
    .sort((a,b) => {
      // overdue 먼저, 그 다음 due_on 오름차순
      if (a.status === 'overdue' && b.status !== 'overdue') return -1;
      if (b.status === 'overdue' && a.status !== 'overdue') return 1;
      if (a.due_on && b.due_on) return a.due_on.localeCompare(b.due_on);
      if (a.due_on) return -1; if (b.due_on) return 1;
      return 0;
    })
    .slice(0, 20);

  document.getElementById('feedCount').textContent = active.length + '건 진행중';
  if (!active.length) { el.innerHTML = '<div class="empty-msg">진행중인 태스크 없음</div>'; return; }
  el.innerHTML = '';
  active.forEach(t => el.appendChild(makeTaskItem(t)));
}

// ── 리포트 탭 ─────────────────────────────────────────────────────────
function renderReport(d) {
  // overdue
  const odEl = document.getElementById('overdueList');
  document.getElementById('overdueListCount').textContent = d.overdue.length + '건';
  if (!d.overdue.length) { odEl.innerHTML = '<div class="empty-msg">기한 초과 항목 없음 ✓</div>'; }
  else {
    odEl.innerHTML = '';
    d.overdue.forEach(t => {
      const card = makeIssueCard(t, 'overdue');
      odEl.appendChild(card);
    });
  }

  // no-assignee
  const naEl = document.getElementById('noOwnerList');
  document.getElementById('noOwnerListCount').textContent = d.no_assignee.length + '건';
  if (!d.no_assignee.length) { naEl.innerHTML = '<div class="empty-msg">미배정 항목 없음 ✓</div>'; }
  else {
    naEl.innerHTML = '';
    d.no_assignee.forEach(t => {
      const card = makeIssueCard(t, 'no-owner');
      naEl.appendChild(card);
    });
  }
}

// ── 전체 태스크 탭 ────────────────────────────────────────────────────
function renderAllTasks(d) {
  // section filter 버튼
  const filterEl = document.getElementById('sectionFilter');
  filterEl.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'ftab active'; allBtn.textContent = '전체';
  allBtn.onclick = () => { currentSection = 'all'; filterAllTasks(d); setActiveFilter(allBtn); };
  filterEl.appendChild(allBtn);

  d.sections.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'ftab'; btn.textContent = sec;
    btn.onclick = () => { currentSection = sec; filterAllTasks(d); setActiveFilter(btn); };
    filterEl.appendChild(btn);
  });

  filterAllTasks(d);
}

function setActiveFilter(btn) {
  document.querySelectorAll('#sectionFilter .ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function filterAllTasks(d) {
  const el = document.getElementById('allTaskList');
  const items = currentSection === 'all' ? d.tasks : d.tasks.filter(t => t.section === currentSection);
  document.getElementById('allTaskCount').textContent = items.length + '개';
  if (!items.length) { el.innerHTML = '<div class="empty-msg">태스크 없음</div>'; return; }
  el.innerHTML = '';
  items.forEach(t => el.appendChild(makeTaskItem(t)));
}

// ── 태스크 아이템 공통 컴포넌트 ───────────────────────────────────────
function makeTaskItem(t) {
  const item = document.createElement('div');
  item.className = 'task-item';
  const flags = [];
  if (t.status === 'overdue') flags.push(`<span class="flag flag-overdue">기한초과</span>`);
  if (!t.assignee) flags.push(`<span class="flag flag-no-owner">담당자없음</span>`);

  const dueStr  = t.due_on ? formatDate(t.due_on) : '마감일 없음';
  const dueColor = t.status === 'overdue' ? 'color:var(--red)' : '';

  item.innerHTML = `
    <span class="sdot ${statusDot[t.status] || 's-todo'}" style="margin-top:4px"></span>
    <div style="overflow:hidden">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span>${t.assignee || '<span style="color:var(--amber)">담당자 없음</span>'}</span>
        <span style="color:var(--text3)">·</span>
        <span style="${dueColor}">${dueStr}</span>
        ${t.section ? `<span style="color:var(--text3)">·</span><span style="color:var(--text3)">${t.section}</span>` : ''}
      </div>
      ${flags.length ? `<div style="margin-top:5px;display:flex;gap:4px">${flags.join('')}</div>` : ''}
    </div>
    <div class="task-tags">
      <span class="flag" style="background:rgba(255,255,255,0.04);color:var(--text3)">${statusLabel[t.status] || '—'}</span>
    </div>
  `;
  if (t.url) item.onclick = () => window.open(t.url, '_blank');
  return item;
}

// ── 이슈 카드 ─────────────────────────────────────────────────────────
function makeIssueCard(t, type) {
  const card = document.createElement('div');
  card.className = `issue-card ${type}`;
  const dueStr   = t.due_on ? formatDate(t.due_on) : '마감일 없음';
  const dueColor = type === 'overdue' ? 'color:var(--red)' : '';

  card.innerHTML = `
    <div>
      <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px">${escHtml(t.title)}</div>
      <div style="font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${t.assignee
          ? `<span>${t.assignee}</span>`
          : `<span class="flag flag-no-owner">담당자 없음</span>`}
        <span style="${dueColor}">${dueStr}</span>
        ${t.section ? `<span style="color:var(--text3)">·</span><span>${t.section}</span>` : ''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      ${type === 'overdue'
        ? `<span class="flag flag-overdue">+${daysSince(t.due_on)}일 초과</span>`
        : `<span class="flag flag-no-owner">미배정</span>`}
      ${t.url ? `<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">Asana ↗</span>` : ''}
    </div>
  `;
  if (t.url) card.onclick = () => window.open(t.url, '_blank');
  return card;
}

// ── 유틸 ─────────────────────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${m}/${d}`;
}

function daysSince(iso) {
  if (!iso) return 0;
  const diff = Date.now() - new Date(iso).getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── 초기화 ────────────────────────────────────────────────────────────
loadData();
// 10분마다 자동 새로고침 (페이지를 열어둔 상태에서 Actions 실행 시 반영)
setInterval(loadData, 600000);
</script>
