name: Sync Asana Data

on:
  schedule:
    - cron: '0 * * * *'   # 매시 정각 (1시간마다)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch Asana data and generate data.json
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ASANA_PROJECT_ID: ${{ secrets.ASANA_PROJECT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.parse, sys
          from datetime import datetime, timezone, timedelta

          TOKEN      = os.environ.get("ASANA_TOKEN", "").strip()
          PROJECT_ID = os.environ.get("ASANA_PROJECT_ID", "").strip()

          if not TOKEN:
              print("ERROR: ASANA_TOKEN secret이 비어 있습니다. 저장소 Settings → Secrets → ASANA_TOKEN 을 확인해 주세요.")
              sys.exit(1)
          if not PROJECT_ID:
              print("ERROR: ASANA_PROJECT_ID secret이 비어 있습니다. 저장소 Settings → Secrets → ASANA_PROJECT_ID 를 확인해 주세요.")
              sys.exit(1)
          KST        = timezone(timedelta(hours=9))
          NOW        = datetime.now(KST)
          TODAY      = NOW.date()

          def asana_get(path):
              url = f"https://app.asana.com/api/1.0{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/json"
              })
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())["data"]
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"ERROR: Asana API 실패 [{e.code}] {path}")
                  print(f"  응답: {body[:300]}")
                  if e.code == 401:
                      print("  → ASANA_TOKEN 이 잘못되었거나 만료되었습니다.")
                  elif e.code == 403:
                      print("  → 해당 프로젝트에 접근 권한이 없습니다.")
                  elif e.code == 404:
                      print("  → ASANA_PROJECT_ID 가 잘못되었습니다. URL에서 숫자 ID를 다시 확인해 주세요.")
                  sys.exit(1)

          # ── 프로젝트 메타 ──────────────────────────────────────────
          project = asana_get(f"/projects/{PROJECT_ID}?opt_fields=name,due_date,created_at")

          # ── 섹션 목록 ──────────────────────────────────────────────
          sections = asana_get(f"/projects/{PROJECT_ID}/sections?opt_fields=name")
          section_map = {s["gid"]: s["name"] for s in sections}

          # ── 태스크 목록 ───────────────────────────────────────────
          fields = "name,assignee.name,due_on,completed,memberships.section.gid,permalink_url,num_subtasks"
          tasks_raw = asana_get(f"/projects/{PROJECT_ID}/tasks?opt_fields={fields}&limit=100")

          tasks = []
          no_assignee = []
          overdue     = []

          def make_task(t, section, parent_title=None):
              assignee  = (t.get("assignee") or {}).get("name", "")
              due_on    = t.get("due_on") or ""
              completed = t.get("completed", False)
              url       = t.get("permalink_url", "")
              name      = t.get("name", "")

              if completed:
                  status = "done"
              elif due_on and datetime.strptime(due_on, "%Y-%m-%d").date() < TODAY:
                  status = "overdue"
              else:
                  status = "progress" if assignee else "todo"

              # 하위 태스크는 제목 앞에 부모 태스크명을 표시
              display_title = f"↳ {name}" if parent_title else name

              return {
                  "gid":          t["gid"],
                  "title":        display_title,
                  "assignee":     assignee,
                  "due_on":       due_on,
                  "completed":    completed,
                  "status":       status,
                  "section":      section,
                  "url":          url,
                  "is_subtask":   parent_title is not None,
                  "parent_title": parent_title or "",
              }

          sub_fields = "name,assignee.name,due_on,completed,permalink_url"

          for t in tasks_raw:
              # 섹션 이름 추출
              section = ""
              for m in t.get("memberships", []):
                  sgid = m.get("section", {}).get("gid", "")
                  if sgid in section_map:
                      section = section_map[sgid]
                      break

              task = make_task(t, section)
              tasks.append(task)

              # 하위 태스크 수집 (num_subtasks > 0 인 경우만)
              if t.get("num_subtasks", 0) > 0:
                  try:
                      subtasks_raw = asana_get(
                          f"/tasks/{t['gid']}/subtasks?opt_fields={sub_fields}&limit=50"
                      )
                      for st in subtasks_raw:
                          subtask = make_task(st, section, parent_title=t.get("name",""))
                          tasks.append(subtask)
                  except Exception as e:
                      print(f"  경고: {t.get('name','')} 하위 태스크 조회 실패 - {e}")

          # 이슈 플래그
          for task in tasks:
              if not task["assignee"] and not task["completed"]:
                  no_assignee.append(task)
              if task["status"] == "overdue":
                  overdue.append(task)

          # ── 완료율 계산 ────────────────────────────────────────────
          total     = len(tasks)
          done_cnt  = sum(1 for t in tasks if t["completed"])
          done_rate = round(done_cnt / total * 100) if total else 0
          overdue_cnt = len(overdue)

          # ── 담당자별 작업 수 ───────────────────────────────────────
          from collections import Counter
          owner_counts = Counter(
              t["assignee"] for t in tasks if t["assignee"] and not t["completed"]
          )

          output = {
              "synced_at":     NOW.strftime("%Y-%m-%d %H:%M KST"),
              "project_name":  project.get("name", ""),
              "project_due":   project.get("due_date", ""),
              "total":         total,
              "done":          done_cnt,
              "done_rate":     done_rate,
              "overdue_count": overdue_cnt,
              "tasks":         tasks,
              "no_assignee":   no_assignee,
              "overdue":       overdue,
              "owner_counts":  dict(owner_counts),
              "sections":      list(section_map.values()),
          }

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✓ {total}개 태스크 동기화 완료 (완료율 {done_rate}%, 지연 {overdue_cnt}건)")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: sync asana data $(date +'%Y-%m-%d %H:%M KST')"
          git push
